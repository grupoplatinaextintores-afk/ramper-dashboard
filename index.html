<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Ramper · Platina Extintores</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #C0392B;
  --red-light: #FAECE7;
  --dark: #1A1A2E;
  --green: #1D9E75;
  --green-bg: #E1F5EE;
  --amber: #BA7517;
  --amber-bg: #FAEEDA;
  --blue: #185FA5;
  --blue-bg: #E6F1FB;
  --gray: #5F5E5A;
  --gray-bg: #F1EFE8;
  --border: #E0DED7;
  --bg: #F7F6F2;
  --surface: #FFFFFF;
  --text: #1A1A2E;
  --text-2: #5F5E5A;
  --text-3: #9C9A92;
  --danger: #E24B4A;
  --danger-bg: #FCEBEB;
  --radius: 10px;
  --radius-sm: 6px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: var(--dark);
  padding: 0 2rem;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.brand-icon {
  width: 28px; height: 28px;
  background: var(--red);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
}
.brand-icon svg { width: 16px; height: 16px; fill: white; }
.brand-name { font-size: 14px; font-weight: 600; color: white; letter-spacing: .02em; }
.brand-sub { font-size: 11px; color: rgba(255,255,255,.45); margin-left: 2px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.last-update { font-size: 11px; color: rgba(255,255,255,.4); }
.btn-refresh {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.15);
  color: white;
  border-radius: var(--radius-sm);
  padding: 5px 12px;
  font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background .15s;
}
.btn-refresh:hover { background: rgba(255,255,255,.18); }
.btn-refresh svg { width: 13px; height: 13px; fill: none; stroke: white; stroke-width: 2; }

/* LAYOUT */
.main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.5rem 3rem; }

/* FILTROS */
.filters {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 1.25rem; flex-wrap: wrap;
}
.filter-label { font-size: 12px; color: var(--text-2); }
.filter-select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 6px 10px; font-size: 12px; color: var(--text); cursor: pointer;
}
.filter-select:focus { outline: none; border-color: var(--red); }
.badge-live {
  display: flex; align-items: center; gap: 5px;
  background: var(--green-bg); color: var(--green);
  border-radius: 20px; padding: 4px 10px;
  font-size: 11px; font-weight: 500; margin-left: auto;
}
.dot-live {
  width: 7px; height: 7px;
  background: var(--green); border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* MÉTRICAS */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px; margin-bottom: 1.5rem;
}
.metric {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: .875rem 1rem;
}
.metric.highlight { border-left: 3px solid var(--green); }
.metric.highlight-warn { border-left: 3px solid var(--danger); }
.metric-label { font-size: 11px; color: var(--text-3); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.metric-value { font-size: 28px; font-weight: 600; color: var(--text); line-height: 1; margin-bottom: 4px; }
.metric-value.green { color: var(--green); }
.metric-value.red { color: var(--danger); }
.metric-sub { font-size: 11px; color: var(--text-3); }

/* SEÇÕES */
.section-title {
  font-size: 11px; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: .07em;
  margin-bottom: .75rem; margin-top: 1.75rem;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* FUNIL */
.funnel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
}
.funnel-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.funnel-row:last-child { margin-bottom: 0; }
.funnel-name { font-size: 12px; color: var(--text-2); min-width: 150px; }
.funnel-track { flex: 1; background: var(--bg); border-radius: 4px; height: 28px; overflow: hidden; }
.funnel-fill {
  height: 100%; border-radius: 4px;
  display: flex; align-items: center; padding-left: 10px;
  font-size: 11px; font-weight: 600; color: white;
  transition: width .7s cubic-bezier(.4,0,.2,1);
  min-width: 36px;
}
.funnel-n { font-size: 13px; font-weight: 600; color: var(--text); min-width: 40px; text-align: right; }

/* GRID 2 COLS */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media(max-width:640px){ .grid2{ grid-template-columns:1fr; } .metrics-grid{ grid-template-columns:1fr 1fr; } }

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
}
.chart-wrap { position: relative; width: 100%; }

/* VENDEDOR */
.seller-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 1rem; padding-bottom: .75rem;
  border-bottom: 1px solid var(--border);
}
.avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600;
}
.av-blue { background: var(--blue-bg); color: var(--blue); }
.av-amber { background: var(--amber-bg); color: var(--amber); }
.seller-name { font-size: 14px; font-weight: 600; color: var(--text); }
.seller-region { font-size: 11px; color: var(--text-3); }
.kpi-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.kpi-row:last-child { border-bottom: none; }
.kpi-key { color: var(--text-2); }
.kpi-val { font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; }
.pill { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
.p-green { background: var(--green-bg); color: var(--green); }
.p-amber { background: var(--amber-bg); color: var(--amber); }
.p-gray { background: var(--gray-bg); color: var(--gray); }
.p-red { background: var(--danger-bg); color: var(--danger); }
.p-blue { background: var(--blue-bg); color: var(--blue); }

/* LOADING */
.state-msg { text-align: center; padding: 3rem; color: var(--text-3); font-size: 13px; }
.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border); border-top-color: var(--red);
  border-radius: 50%; animation: spin .7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* FOOTER */
.footer {
  margin-top: 2rem; padding: 1rem 0;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-3);
  display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;
}
code {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 5px;
  font-size: 11px; font-family: monospace;
}

/* ETAPAS FUP */
.fup-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--blue-bg); color: var(--blue);
  border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 500;
}
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L4 7v10l8 5 8-5V7L12 2z"/></svg>
    </div>
    <div>
      <span class="brand-name">Platina Extintores</span>
      <span class="brand-sub">Ramper · Prospecção Outbound</span>
    </div>
  </div>
  <div class="header-right">
    <span class="last-update" id="last-update">—</span>
    <button class="btn-refresh" onclick="loadData()">
      <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Atualizar
    </button>
  </div>
</header>

<main class="main">
  <div class="filters">
    <span class="filter-label">Vendedor:</span>
    <select class="filter-select" id="filter-seller" onchange="loadData()">
      <option value="all">Todos</option>
      <option value="Ronaldo">Ronaldo</option>
      <option value="David">David</option>
    </select>
    <span class="filter-label">Status:</span>
    <select class="filter-select" id="filter-status" onchange="loadData()">
      <option value="all">Todos</option>
      <option value="ativo">Ativos</option>
      <option value="pausado">Pausados</option>
      <option value="finalizado">Finalizados</option>
    </select>
    <span class="badge-live"><span class="dot-live"></span>Tempo real</span>
  </div>

  <div id="app-content">
    <div class="state-msg"><div class="spinner"></div>Carregando dados...</div>
  </div>
</main>

<script>
/* ══════════════════════════════════════════════
   CONFIGURAÇÃO — substitua o valor abaixo pelo
   ID da sua planilha Google Sheets (deve ser
   pública ou com acesso "qualquer pessoa com o link")
   
   Como obter: Planilha → Compartilhar → "Qualquer pessoa com o link"
   ID está na URL: /spreadsheets/d/ESTE_ID/edit
══════════════════════════════════════════════ */
const SHEET_ID = '1iM7RpYL5HvdUHngRGGMqBG6159L1duOeellWPpn-gh8';
const SHEET_NAME = 'Pendentes_IA';

/* Colunas da planilha (índice 0 = coluna A) */
const COL = {
  LEAD_ID: 0,       // A
  VENDEDOR: 1,      // B
  NOME: 2,          // C
  EMPRESA: 3,       // D
  EMAIL: 4,         // E
  TELEFONE: 5,      // F
  STATUS_INTERNO: 6,// G
  ETAPA_FUNIL: 7,   // H
  ULTIMA_ACAO: 8,   // I
  DATA_ULTIMA: 9,   // J
  DECISOR: 10,      // K
  CONTEXTO: 11,     // L
  STATUS: 12,       // M
  PROXIMA_ACAO: 13, // N
  DATA_PROXIMA: 14, // O
  STATUS_EXEC: 15,  // P
  TENTATIVAS: 16,   // Q
  MSG_ID: 17,       // R
};

/* MODO DEMO — ativo enquanto SHEET_ID não for configurado */
const DEMO_MODE = false;

function gerarDemoData() {
  const vendedores = ['Ronaldo', 'David'];
  const etapas = ['enviar_apresentacao','fup1','fup2','fup3','fup4','ia_responder','handoff','finalizar'];
  const statuses = ['ativo','ativo','ativo','ativo','pausado','pausado','finalizado'];
  const internos = ['novo','em_andamento','em_andamento','qualificado','encerrado_handoff','desqualificado'];
  const rows = [];
  for (let i = 0; i < 320; i++) {
    const vend = vendedores[i % 2 === 0 ? 0 : 1];
    const tentativas = Math.floor(Math.random() * 5);
    const status = statuses[Math.floor(Math.random() * statuses.length)];
    const interno = internos[Math.floor(Math.random() * internos.length)];
    const proxima = etapas[Math.floor(Math.random() * etapas.length)];
    const statusExec = status === 'finalizado' ? 'finalizado' : status === 'pausado' ? 'pausado' : 'pendente';
    rows.push({
      vendedor: vend,
      status,
      status_interno: interno,
      proxima_acao: proxima,
      status_exec: statusExec,
      tentativas,
    });
  }
  return rows;
}

let chartFunil = null;
let chartVendedores = null;
let chartEtapas = null;

async function fetchRows() {
  if (DEMO_MODE) return gerarDemoData();

  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const rows = json.table.rows.slice(1); // pula header
  return rows.map(r => ({
    vendedor:      r.c[COL.VENDEDOR]?.v || '',
    status:        r.c[COL.STATUS]?.v || '',
    status_interno:r.c[COL.STATUS_INTERNO]?.v || '',
    proxima_acao:  r.c[COL.PROXIMA_ACAO]?.v || '',
    status_exec:   r.c[COL.STATUS_EXEC]?.v || '',
    tentativas:    parseInt(r.c[COL.TENTATIVAS]?.v || 0),
  }));
}

function filtrar(rows) {
  const seller = document.getElementById('filter-seller')?.value || 'all';
  const status = document.getElementById('filter-status')?.value || 'all';
  return rows.filter(r => {
    if (seller !== 'all' && r.vendedor !== seller) return false;
    if (status !== 'all' && r.status !== status) return false;
    return true;
  });
}

function calcMetrics(rows) {
  const total = rows.length;

  // Funil de cadência
  const enviados       = rows.filter(r => r.tentativas >= 0).length; // todos entraram
  const receberam_fup  = rows.filter(r => r.tentativas >= 1).length;
  const engajados      = rows.filter(r => ['ia_responder','handoff','encerrado_handoff','qualificado'].includes(r.status_interno)).length;
  const handoffs       = rows.filter(r => r.status_interno === 'encerrado_handoff' || r.proxima_acao === 'handoff').length;
  const desqualificados= rows.filter(r => r.status_interno === 'desqualificado').length;
  const ativos         = rows.filter(r => r.status === 'ativo').length;
  const pausados       = rows.filter(r => r.status === 'pausado').length;
  const finalizados    = rows.filter(r => r.status_exec === 'finalizado').length;

  // Por etapa de follow-up
  const porTentativa = [0,1,2,3,4].map(n => ({
    n,
    total: rows.filter(r => r.tentativas === n).length,
    engajados: rows.filter(r => r.tentativas === n && ['ia_responder','handoff','encerrado_handoff','qualificado'].includes(r.status_interno)).length,
    handoff: rows.filter(r => r.tentativas === n && (r.status_interno === 'encerrado_handoff' || r.proxima_acao === 'handoff')).length,
  }));

  // Por vendedor
  const porVendedor = ['Ronaldo', 'David'].map(nome => {
    const sub = rows.filter(r => r.vendedor === nome);
    return {
      nome,
      total: sub.length,
      ativos: sub.filter(r => r.status === 'ativo').length,
      engajados: sub.filter(r => ['ia_responder','handoff','encerrado_handoff','qualificado'].includes(r.status_interno)).length,
      handoffs: sub.filter(r => r.status_interno === 'encerrado_handoff' || r.proxima_acao === 'handoff').length,
      desqualificados: sub.filter(r => r.status_interno === 'desqualificado').length,
      finalizados: sub.filter(r => r.status_exec === 'finalizado').length,
    };
  });

  return { total, enviados, receberam_fup, engajados, handoffs, desqualificados, ativos, pausados, finalizados, porTentativa, porVendedor };
}

function pct(a, b) { return b ? (a/b*100).toFixed(1)+'%' : '—'; }
function renderPill(text, cls) { return `<span class="pill ${cls}">${text}</span>`; }

function buildCharts(m) {
  const etapas = ['Apresentação','FUP 1','FUP 2','FUP 3','FUP 4'];

  // Gráfico por etapa
  if (chartEtapas) chartEtapas.destroy();
  chartEtapas = new Chart(document.getElementById('chartEtapas'), {
    type: 'bar',
    data: {
      labels: etapas,
      datasets: [
        { label: 'Total na etapa', data: m.porTentativa.map(f => f.total), backgroundColor: '#378ADD55', borderColor: '#378ADD', borderWidth: 1.5 },
        { label: 'Engajados', data: m.porTentativa.map(f => f.engajados), backgroundColor: '#1D9E7555', borderColor: '#1D9E75', borderWidth: 1.5 },
        { label: 'Handoffs', data: m.porTentativa.map(f => f.handoff), backgroundColor: '#BA751755', borderColor: '#BA7517', borderWidth: 1.5 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#9C9A92', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.06)' } },
        y: { ticks: { color: '#9C9A92', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.06)' }, beginAtZero: true }
      }
    }
  });

  // Gráfico comparativo vendedores
  if (chartVendedores) chartVendedores.destroy();
  chartVendedores = new Chart(document.getElementById('chartVendedores'), {
    type: 'bar',
    data: {
      labels: ['Total leads','Ativos','Engajados','Handoffs'],
      datasets: [
        { label: 'Ronaldo', data: [m.porVendedor[0].total, m.porVendedor[0].ativos, m.porVendedor[0].engajados, m.porVendedor[0].handoffs], backgroundColor: '#185FA555', borderColor: '#185FA5', borderWidth: 1.5 },
        { label: 'David',   data: [m.porVendedor[1].total, m.porVendedor[1].ativos, m.porVendedor[1].engajados, m.porVendedor[1].handoffs], backgroundColor: '#BA751755', borderColor: '#BA7517', borderWidth: 1.5 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#9C9A92', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.06)' } },
        y: { ticks: { color: '#9C9A92', font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.06)' }, beginAtZero: true }
      }
    }
  });
}

function renderLegend(id, items) {
  document.getElementById(id).innerHTML = items.map(([c, l]) =>
    `<span style="display:flex;align-items:center;gap:5px">
      <span style="width:10px;height:10px;border-radius:2px;background:${c}"></span>
      <span style="font-size:12px;color:#5F5E5A">${l}</span>
    </span>`
  ).join('');
}

function renderApp(m) {
  const sellerInfo = {
    'Ronaldo': { av: 'RO', avcls: 'av-blue', desc: 'LEAD 1943' },
    'David':   { av: 'DA', avcls: 'av-amber', desc: 'LEAD 8206' },
  };

  const funnel = [
    { label: 'Leads prospectados',  n: m.total,          base: m.total, color: '#378ADD' },
    { label: 'Receberam follow-up', n: m.receberam_fup,  base: m.total, color: '#185FA5' },
    { label: 'Engajados (IA)',      n: m.engajados,      base: m.total, color: '#1D9E75' },
    { label: 'Handoffs realizados', n: m.handoffs,       base: m.total, color: '#BA7517' },
    { label: 'Desqualificados',     n: m.desqualificados,base: m.total, color: '#E24B4A' },
  ];

  document.getElementById('app-content').innerHTML = `

    <div class="metrics-grid">
      <div class="metric">
        <div class="metric-label">Total de leads</div>
        <div class="metric-value">${m.total}</div>
        <div class="metric-sub">na campanha</div>
      </div>
      <div class="metric">
        <div class="metric-label">Ativos</div>
        <div class="metric-value">${m.ativos}</div>
        <div class="metric-sub">${pct(m.ativos, m.total)} do total</div>
      </div>
      <div class="metric">
        <div class="metric-label">Engajados (IA)</div>
        <div class="metric-value">${m.engajados}</div>
        <div class="metric-sub">${pct(m.engajados, m.total)} do total</div>
      </div>
      <div class="metric highlight">
        <div class="metric-label">Handoffs</div>
        <div class="metric-value green">${m.handoffs}</div>
        <div class="metric-sub">${pct(m.handoffs, m.engajados)} dos engajados</div>
      </div>
      <div class="metric">
        <div class="metric-label">Finalizados</div>
        <div class="metric-value">${m.finalizados}</div>
        <div class="metric-sub">${pct(m.finalizados, m.total)} do total</div>
      </div>
      <div class="metric highlight-warn">
        <div class="metric-label">Desqualificados</div>
        <div class="metric-value red">${m.desqualificados}</div>
        <div class="metric-sub">${pct(m.desqualificados, m.total)} do total</div>
      </div>
    </div>

    <div class="section-title">Funil de prospecção</div>
    <div class="funnel-card">
      ${funnel.map(f => {
        const w = m.total ? Math.max(3, Math.round(f.n / f.base * 100)) : 3;
        return `<div class="funnel-row">
          <span class="funnel-name">${f.label}</span>
          <div class="funnel-track">
            <div class="funnel-fill" style="width:${w}%;background:${f.color}">${pct(f.n, f.base)}</div>
          </div>
          <span class="funnel-n">${f.n}</span>
        </div>`;
      }).join('')}
    </div>

    <div class="section-title">Resultado por etapa de cadência</div>
    <div class="card" style="margin-bottom:1rem">
      <div class="chart-wrap" style="height:220px">
        <canvas id="chartEtapas" role="img" aria-label="Resultado por etapa de cadência"></canvas>
      </div>
    </div>
    <div id="legend-etapas" style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:1.5rem"></div>

    <div class="section-title">Desempenho por vendedor</div>
    <div class="grid2" style="margin-bottom:1rem">
      ${['Ronaldo', 'David'].map((nome, i) => {
        const sv = m.porVendedor[i];
        const si = sellerInfo[nome];
        return `<div class="card">
          <div class="seller-header">
            <div class="avatar ${si.avcls}">${si.av}</div>
            <div>
              <div class="seller-name">${nome}</div>
              <div class="seller-region">${si.desc}</div>
            </div>
          </div>
          <div class="kpi-row"><span class="kpi-key">Total de leads</span><span class="kpi-val">${sv.total}</span></div>
          <div class="kpi-row"><span class="kpi-key">Ativos</span><span class="kpi-val">${sv.ativos} ${renderPill(pct(sv.ativos, sv.total), 'p-blue')}</span></div>
          <div class="kpi-row"><span class="kpi-key">Engajados (IA respondeu)</span><span class="kpi-val">${sv.engajados} ${renderPill(pct(sv.engajados, sv.total), 'p-gray')}</span></div>
          <div class="kpi-row"><span class="kpi-key">Handoffs para vendedor</span><span class="kpi-val">${sv.handoffs} ${renderPill(pct(sv.handoffs, sv.engajados), 'p-green')}</span></div>
          <div class="kpi-row"><span class="kpi-key">Taxa handoff/lead</span><span class="kpi-val" style="color:var(--green);font-weight:600">${pct(sv.handoffs, sv.total)}</span></div>
          <div class="kpi-row"><span class="kpi-key">Desqualificados</span><span class="kpi-val">${sv.desqualificados} ${renderPill(pct(sv.desqualificados, sv.total), 'p-red')}</span></div>
        </div>`;
      }).join('')}
    </div>

    <div class="card" style="margin-bottom:.5rem">
      <div class="chart-wrap" style="height:200px">
        <canvas id="chartVendedores" role="img" aria-label="Comparativo entre vendedores"></canvas>
      </div>
    </div>
    <div id="legend-vendedores" style="display:flex;gap:16px;margin-bottom:2rem"></div>

    <div class="footer">
      <span>Dados lidos em tempo real via Google Sheets · aba <code>${SHEET_NAME}</code></span>
      <span id="demo-note" style="color:var(--amber)">${DEMO_MODE ? '⚠ Modo demo — substitua SHEET_ID no arquivo index.html' : ''}</span>
    </div>
  `;

  buildCharts(m);
  renderLegend('legend-etapas', [['#378ADD','Total na etapa'],['#1D9E75','Engajados'],['#BA7517','Handoffs']]);
  renderLegend('legend-vendedores', [['#185FA5','Ronaldo'],['#BA7517','David']]);
}

async function loadData() {
  try {
    document.getElementById('app-content').innerHTML =
      '<div class="state-msg"><div class="spinner"></div>Carregando dados...</div>';
    const rows = await fetchRows();
    const filtered = filtrar(rows);
    renderApp(calcMetrics(filtered));
    document.getElementById('last-update').textContent =
      'Atualizado ' + new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('app-content').innerHTML =
      `<div class="state-msg">Erro ao carregar dados: ${e.message}<br><br>
      Verifique se o SHEET_ID está correto e se a planilha está pública.</div>`;
  }
}

loadData();
</script>
</body>
</html>
